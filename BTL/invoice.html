<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hóa đơn điện tử - MOT Store</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:"Be Vietnam Pro",Arial,Helvetica,sans-serif;background:#f4f6f8;color:#1f2937}.invoice-page{max-width:980px;margin:32px auto;padding:0 18px}.invoice-actions{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}.invoice-actions a,.invoice-actions button{border:0;border-radius:999px;padding:11px 18px;font-weight:800;text-decoration:none;cursor:url("assets/images/cursor-pen-pointer.png") 4 28, pointer}.invoice-actions a{background:#fff;color:#c92127}.invoice-actions button{background:#c92127;color:#fff}.invoice-card{background:#fff;border-radius:22px;padding:34px;box-shadow:0 12px 36px rgba(16,24,40,.08)}.invoice-head{display:flex;justify-content:space-between;gap:20px;border-bottom:2px solid #f1f5f9;padding-bottom:20px;margin-bottom:20px}.brand{display:flex;gap:14px;align-items:center}.brand img{width:92px}.brand h1{margin:0;color:#c92127;font-size:25px}.invoice-code{text-align:right}.invoice-code h2{margin:0 0 8px;font-size:25px}.invoice-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px}.info-box{background:#f8fafc;border-radius:16px;padding:16px}.info-box h3{margin:0 0 10px;color:#c92127;font-size:16px}.info-box p{margin:6px 0}.invoice-table{width:100%;border-collapse:collapse;margin:16px 0}.invoice-table th,.invoice-table td{border-bottom:1px solid #e5e7eb;padding:12px;text-align:left}.invoice-table th{background:#f8fafc;color:#667085}.invoice-table img{width:48px;height:64px;object-fit:cover;border-radius:7px}.product-cell{display:flex;align-items:center;gap:12px}.invoice-total{margin-left:auto;max-width:340px}.invoice-total div{display:flex;justify-content:space-between;padding:8px 0}.invoice-total .grand{font-size:22px;color:#c92127;font-weight:900;border-top:2px solid #e5e7eb;margin-top:8px;padding-top:14px}.invoice-note{margin-top:24px;color:#667085;text-align:center}@media print{body{background:#fff}.invoice-actions{display:none}.invoice-page{margin:0;max-width:none}.invoice-card{box-shadow:none;border-radius:0}.invoice-table th{background:#fff}}@media(max-width:720px){.invoice-head,.invoice-grid{grid-template-columns:1fr;display:grid}.invoice-code{text-align:left}.product-cell{align-items:flex-start}.invoice-table{font-size:13px}}
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="enhancements.css">
</head>
<body>
  <main class="invoice-page">
    <div class="invoice-actions">
      <a href="index.html"><i class="fa-solid fa-house"></i> Về trang chủ</a>
      <button onclick="window.print()"><i class="fa-solid fa-print"></i> In / lưu PDF</button>
    </div>
    <section class="invoice-card" id="invoiceRoot">
      <p>Đang tải hóa đơn...</p>
    </section>
  </main>
  <script src="enhancements.js"></script>
  <script src="invoice.js"></script>
</body>
</html>
