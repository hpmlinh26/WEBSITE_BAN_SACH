<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liên hệ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="contact-page">
<div class="top-header-banner"><img src="/assets/images/banner.jpg" alt="Banner Sale"></div>
<!-- @partial:header -->
<main class="contact-page-main">
  <section class="page-hero"><h1>Liên hệ MOT Store</h1><p>Gửi phản hồi, góp ý hoặc câu hỏi để admin xử lý trong trang quản trị.</p></section>
  <section class="contact-layout">
    <div class="contact-card"><h2>Thông tin liên hệ</h2><p><i class="fa-solid fa-location-dot"></i> Đại học Thăng Long, Hà Nội</p><p><i class="fa-solid fa-envelope"></i> mot@gmail.com.vn</p><p><i class="fa-solid fa-phone"></i> 0337448886</p></div>
    <form class="contact-card" id="feedbackForm"><h2>Gửi tin nhắn</h2><input name="fullName" required placeholder="Họ tên"><input name="email" type="email" placeholder="Email"><input name="phone" placeholder="Số điện thoại"><input name="subject" placeholder="Tiêu đề phản hồi"><textarea name="message" required placeholder="Nội dung"></textarea><button class="btn-login" type="submit">Gửi liên hệ</button></form>
  </section>
</main>
<!-- @partial:newsletter -->
<!-- @partial:footer -->
<script>
document.getElementById('feedbackForm')?.addEventListener('submit', async function(e){
  e.preventDefault();
  const payload = Object.fromEntries(new FormData(this).entries());
  try {
    const response = await fetch('/api/feedbacks', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
    const data = await response.json().catch(()=>({}));
    if(!response.ok) throw new Error(data.message || 'Không gửi được phản hồi');
    alert('Đã gửi phản hồi thành công. Admin sẽ xem trong trang quản trị.');
    this.reset();
  } catch(error) {
    alert(error.message || 'Không gửi được phản hồi.');
  }
});
</script>
  <script type="module" src="/src/js/entries/storefront.js"></script>
</body>
</html>
