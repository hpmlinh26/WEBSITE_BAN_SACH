<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - Payment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- TOP HEADER BANNER -->
    <div class="top-header-banner">
        <img src="/assets/images/banner.jpg" alt="Banner Sale">
    </div>

    <!-- HEADER -->
    <!-- @partial:header -->
<div class="checkout-container">
        <div class="checkout-top-grid">
            
            <div class="card shipping-address">
                <h2>Địa chỉ giao hàng</h2>
                <form id="address-form">
                    <div class="form-group">
                        <label>Họ <span class="required">*</span></label>
                        <input type="text" id="firstName" name="firstName" placeholder="Nhập họ" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Tên <span class="required">*</span></label>
                        <input type="text" id="lastName" name="lastName" placeholder="Nhập tên" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Số điện thoại <span class="required">*</span></label>
                        <input type="tel" id="phone" name="phone" placeholder="Nhập số điện thoại" pattern="[0-9]{9,11}" required>
                    </div>

                    <div class="form-group">
                        <label>Email nhận hóa đơn</label>
                        <input type="email" id="email" name="email" placeholder="Nhập email nhận hóa đơn">
                    </div>
                    
                    <div class="form-group">
                        <label>Quốc gia <span class="required">*</span></label>
                        <div class="select-wrapper">
                            <select id="country" name="country" required>
                                <option value="VN">Việt Nam</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Tỉnh/Thành phố <span class="required">*</span></label>
                        <div class="select-wrapper">
                            <select id="city" name="city" required>
                                <option value="">Vui lòng chọn</option>
                                <option value="HN">Hà Nội</option>
                                <option value="HCM">TP. Hồ Chí Minh</option>
                                <option value="BG">Bắc Giang</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Quận/ Huyện <span class="required">*</span></label>
                        <input type="text" id="district" name="district" placeholder="Nhập quận/huyện" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Xã/ Phường <span class="required">*</span></label>
                        <input type="text" id="ward" name="ward" placeholder="Nhập xã/phường" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Địa chỉ <span class="required">*</span></label>
                        <input type="text" id="address" name="address" placeholder="Nhập số nhà, tên đường" required>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-red">LƯU THAY ĐỔI</button>
                    </div>
                </form>
            </div>

            <div class="right-column">
                <div class="card payment-methods">
                    <h2>Phương thức thanh toán</h2>
                    <form id="payment-form">
                        <label class="radio-container">
                            <input type="radio" name="payment" value="zalopay" checked>
                            <span class="checkmark"></span>
                            Ví ZaloPay
                        </label>
                        <label class="radio-container">
                            <input type="radio" name="payment" value="vnpay">
                            <span class="checkmark"></span>
                            VNPay
                        </label>
                        <label class="radio-container">
                            <input type="radio" name="payment" value="shopeepay">
                            <span class="checkmark"></span>
                            Ví ShopeePay
                        </label>
                        <label class="radio-container">
                            <input type="radio" name="payment" value="momo">
                            <span class="checkmark"></span>
                            Ví MoMo
                        </label>
                        <label class="radio-container">
                            <input type="radio" name="payment" value="cod">
                            <span class="checkmark"></span>
                            Thanh toán bằng tiền mặt khi nhận hàng
                        </label>
                        
                        <div class="form-actions">
                            <button type="submit" class="btn btn-red">LƯU THAY ĐỔI</button>
                        </div>
                    </form>
                </div>

                <div class="card promo-code">
                    <h2>Mã khuyến mãi/ Gift card</h2>
                    <div class="promo-input-group">
                        <input type="text" placeholder="Nhập mã khuyến mãi/ Gift card" id="promo-input">
                        <button class="btn btn-blue" id="btn-apply-promo">ÁP DỤNG</button>
                    </div>
                </div>
            </div>

        </div>

        <div class="card order-review">
            <h2>Kiểm tra lại đơn hàng</h2>
            
            <div class="order-items-list">
                <div class="order-item">
                    <div class="item-image">
                        <img src="/assets/images/placeholder-cover.svg" alt="One Piece Stampede">
                    </div>
                    <div class="item-info">
                        <h3 class="item-title">劇場版 ONE PIECE STAMPEDE アニメコミックス 上 (ジャンプコミックス)</h3>
                    </div>
                    <div class="item-price-block">
                        <span class="current-price">200,000</span>
                        <span class="old-price">288,000</span>
                    </div>
                    <div class="item-quantity">1</div>
                    <div class="item-total">200,000</div>
                </div>

                <div class="order-item">
                    <div class="item-image">
                        <img src="/assets/images/placeholder-cover.svg" alt="Ninja Rantaro">
                    </div>
                    <div class="item-info">
                        <h3 class="item-title">Ninja Rantaro - Tập 8 (Tái Bản 2025)</h3>
                    </div>
                    <div class="item-price-block">
                        <span class="current-price">200,000</span>
                        <span class="old-price">288,000</span>
                    </div>
                    <div class="item-quantity">2</div>
                    <div class="item-total">400,000</div>
                </div>
            </div>
        </div>

        <div class="final-action">
            <button class="btn btn-red btn-large" id="btn-confirm-checkout">XÁC NHẬN THANH TOÁN</button>
        </div>

    </div>
    <!-- @partial:newsletter -->
    <!-- @partial:footer -->
  <script type="module" src="/src/js/entries/pay.js"></script>
</body>
</html>
