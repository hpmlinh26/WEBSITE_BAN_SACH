<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOT Store - Sản phẩm</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="products-page">
<div class="top-header-banner"><img src="/assets/images/banner.jpg" alt="Banner Sale"></div>
<!-- @partial:header -->
<main class="products-page-main">
  <section class="page-hero"><h1 class="products-page-title">Tất cả sản phẩm</h1><p>Chọn danh mục, tìm kiếm và bấm trực tiếp vào sản phẩm để xem chi tiết.</p></section>
  <section class="product-toolbar product-toolbar-v8">
    <div class="product-search-wrap"><input id="searchInput" type="text" placeholder="Tìm theo tên sản phẩm, tác giả..."><div id="productSearchSuggest" class="product-search-suggest"></div></div>
    <select id="categoryFilter"><option value="">Tất cả sản phẩm</option></select>
    <input id="minPriceFilter" type="number" min="0" placeholder="Giá từ">
    <input id="maxPriceFilter" type="number" min="0" placeholder="Giá đến">
    <select id="sortFilter">
      <option value="default">Sắp xếp mặc định</option>
      <option value="priceAsc">Giá tăng dần</option>
      <option value="priceDesc">Giá giảm dần</option>
      <option value="stockDesc">Tồn kho nhiều nhất</option>
      <option value="stockAsc">Sắp hết hàng</option>
    </select>
  </section>
  <section id="list-container" class="products-page-grid"></section>
</main>
<!-- @partial:newsletter -->
<!-- @partial:footer -->
  <script type="module" src="/src/js/entries/storefront.js"></script>
</body>
</html>
