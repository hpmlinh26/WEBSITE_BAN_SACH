<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOT Store - Trang chủ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="home-page">
<div class="top-header-banner"><img src="/assets/images/banner.jpg" alt="Banner Sale"></div>
<!-- @partial:header -->
<main>
  <section class="slideshow">
    <div class="slider">
      <img src="/assets/images/slide1.png" class="slide active" alt="Khuyến mãi manga">
      <img src="/assets/images/slide2.png" class="slide" alt="Manga sale">
      <img src="/assets/images/slide4.png" class="slide" alt="Manga hot">
    </div>
  </section>
  <section class="sale-banners"><div class="sale-banner-grid"><img src="/assets/images/banner.sale1.png" alt="Sale 1"><img src="/assets/images/banner.sale2.png" alt="Sale 2"><img src="/assets/images/banner.sale3.png" alt="Sale 3"><img src="/assets/images/banner.sale4.png" alt="Sale 4"></div></section>
  <section class="flash-sale-section">
    <div class="section-header"><div class="header-left"><h2 class="section-title">FLASH SALE</h2><div class="divider"></div><div class="countdown-wrapper"><span class="countdown-text">Kết thúc trong</span><div class="countdown-timer"><div class="time-box">01</div><div class="colon">:</div><div class="time-box">20</div><div class="colon">:</div><div class="time-box">46</div></div></div></div></div>
    <div class="products-grid"></div>
    <div class="view-more-container"><a href="products.html" class="btn-view-more">Xem thêm</a></div>
  </section>
  <section class="category-section">
    <h2 class="section-title"><i class="fa-solid fa-bars-staggered"></i> Danh mục sản phẩm</h2>
    <div class="divider-full"></div>
    <div class="category-grid"></div>
  </section>
  <section class="trending-section">
    <div class="trending-header"><h2 class="trending-title">XU HƯỚNG MUA SẮM</h2></div>
    <div class="trending-tabs"><button class="active" type="button">Sản phẩm HOT</button><button type="button" onclick="location.href='products.html'">Tất cả sản phẩm</button></div>
    <div class="trending-products"><div class="products-grid"></div></div>
    <div class="view-more-container"><a href="products.html" class="btn-view-more">Xem thêm</a></div>
  </section>
</main>
<!-- @partial:newsletter -->
<!-- @partial:footer -->
  <script type="module" src="/src/js/entries/storefront.js"></script>
</body>
</html>
